version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: burnout-analyzer
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: /app/data/burnout.db
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY env var is required}
      ORIGIN: ${ORIGIN:-http://localhost:3000}
    volumes:
      # Persist the SQLite database across container restarts
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  sqlite_data:
    driver: local
